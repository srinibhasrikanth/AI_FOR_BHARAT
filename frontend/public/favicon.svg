<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- Matches gradient-primary: linear-gradient(135deg, hsl(203,68%,38%), hsl(174,84%,33%)) -->
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1f71a3"/>
      <stop offset="100%" stop-color="#0e9b8d"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background — matches sidebar logo container -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Activity icon (lucide-react) scaled & centred in 64×64:
       original viewBox 24×24, points: 22 12 18 12 15 21 9 3 6 12 2 12
       scaled ×2.2, offset +5.6 on both axes                          -->
  <polyline
    points="54,32 45.2,32 38.6,51.8 25.4,12.2 18.8,32 10,32"
    stroke="white"
    stroke-width="4.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"/>
</svg>
